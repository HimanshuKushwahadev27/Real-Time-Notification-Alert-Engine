spring.application.name=engine


# TWILLIO
twillio.account-sid = ${TWillio_ACCOUNT_SID}
twillio.auth-token = ${TWillio_AUTH_TOKEN}
twillio.from-phone-number = ${TWillio_FROM_PHONE_NUMBER}

# KAFKA
spring.kafka.bootstrap-servers=broker:9092
spring.kafka.consumer.group-id=notificationService
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.emi.events
spring.kafka.consumer.properties.specific.avro.reader=true



# MAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.password=${mail.password}
spring.mail.username=himanshumaurya447756@gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# REDIS
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}


# DATABASE
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/notification_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# NOTIFICATION SETTINGS
notification.topics.retry=notification.retry
notification.topics.dlq=notification.dlq
notification.retry.max-attempts=3


# FIREBASE
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:firebase-service-account.json}
